name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@v6.0.5
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
